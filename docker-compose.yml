# alpha — root orchestration for the full stack.
# Self-hosted / Proxmox-ready. Run with: docker compose up --build
#
# Published host ports are overridable so they don't collide with services you
# already run. Copy .env.example to .env and set ALPHA_WEB_PORT / ALPHA_API_PORT /
# ALPHA_DB_PORT — only the host side changes; container-internal ports and the
# service-to-service URLs (db:5432, backend:8000) stay fixed, so nothing else
# needs editing.
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: alpha-db
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    ports:
      - "${ALPHA_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: alpha-backend
    environment:
      DATABASE_URL: postgresql://alpha:alpha@db:5432/alpha
      # Phase 4 live market data: live FX (ECB via Frankfurter) out of the box,
      # with graceful fallback to static references if the feed is unreachable.
      # Plug a carbon feed in via CARBON_PRICE_URL (or CARBON_PRICE_USD_PER_TCO2).
      ALPHA_LIVE_DATA: "1"
    ports:
      - "${ALPHA_API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: alpha-frontend
    environment:
      # The Vite dev server proxies /api and /health to this origin (server-side),
      # so the browser can use same-origin relative paths.
      BACKEND_ORIGIN: "http://backend:8000"
    ports:
      - "${ALPHA_WEB_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
