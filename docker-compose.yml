# alpha — root orchestration for the full stack.
# Self-hosted / Proxmox-ready. Run with: docker compose up --build
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: alpha-db
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: alpha-backend
    environment:
      DATABASE_URL: postgresql://alpha:alpha@db:5432/alpha
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: alpha-frontend
    environment:
      # The Vite dev server proxies /api and /health to this origin (server-side),
      # so the browser can use same-origin relative paths.
      BACKEND_ORIGIN: "http://backend:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
